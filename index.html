<!DOCTYPE html>
<html>
<head>
  <title>Varios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    header {
      padding: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .cart-btn {
      cursor: pointer;
      background: white;
      color: black;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: center;
      padding: 40px;
      flex-wrap: wrap;
    }

    .product {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .sizes button {
      margin: 5px;
      padding: 8px 10px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .sizes .active {
      background: white;
      color: black;
    }

    select, button {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .add {
      background: white;
      color: black;
      width: 100%;
      font-weight: bold;
    }

    /* CART */
    .cart {
      position: fixed;
      right: -350px;
      top: 0;
      width: 300px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.3s;
      border-left: 1px solid #333;
    }

    .cart.open {
      right: 0;
    }

    .cart h2 {
      margin-top: 0;
    }

    .item {
      margin: 10px 0;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .checkout {
      background: white;
      color: black;
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      font-weight: bold;
    }

    .qty {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .qty button {
      padding: 5px 10px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: black;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Varios</div>
  <div class="cart-btn" onclick="toggleCart()">Cart 🛒 (<span id="count">0</span>)</div>
</header>

<div class="container">

  <div class="product">
    <img src="https://i.imgur.com/3QZQZ9v.png">

    <h2>Black Boxy Tee</h2>
    <p>Premium gym + comfort fit</p>
    <h3>€24.99</h3>

    <p>Select Size:</p>
    <div class="sizes">
      <button onclick="setSize('S', this)">S</button>
      <button onclick="setSize('M', this)">M</button>
      <button onclick="setSize('L', this)">L</button>
      <button onclick="setSize('XL', this)">XL</button>
    </div>

    <button class="add" onclick="addToCart()">Add to Cart</button>
  </div>

</div>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>

  <p>Total: €<span id="total">0</span></p>

  <button class="checkout" onclick="checkout()">Checkout with PayPal</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">Added to cart</div>

<script>
let selectedSize = "M";
let cart = [];
let price = 24.99;

function setSize(size, btn) {
  selectedSize = size;

  document.querySelectorAll(".sizes button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
}

function addToCart() {
  let item = {
    name: "Black Boxy Tee",
    size: selectedSize,
    qty: 1,
    price: price
  };

  cart.push(item);
  updateCart();
  showToast();
}

function updateCart() {
  let cartItems = document.getElementById("cartItems");
  cartItems.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach((item, i) => {
    total += item.price * item.qty;
    count += item.qty;

    cartItems.innerHTML += `
      <div class="item">
        <b>${item.name}</b><br>
        Size: ${item.size}<br>

        <div class="qty">
          <button onclick="changeQty(${i}, -1)">-</button>
          <span>${item.qty}</span>
          <button onclick="changeQty(${i}, 1)">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2);
  document.getElementById("count").innerText = count;
}

function changeQty(index, val) {
  cart[index].qty += val;

  if (cart[index].qty <= 0) {
    cart.splice(index, 1);
  }

  updateCart();
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("open");
}

function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  // 🔴 REPLACE THIS WITH YOUR PAYPAL LINK
  window.open("https://www.paypal.com/checkoutnow", "_blank");
}

function showToast() {
  let toast = document.getElementById("toast");
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 1500);
}
</script>

</body>
</html>
