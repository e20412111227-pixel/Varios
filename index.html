<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Varios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: #000;
    }

    header img {
      height: 40px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
      letter-spacing: 2px;
    }

    .hero p {
      color: #aaa;
      margin-top: 10px;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 28px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }

    .product {
      width: 250px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" alt="Varios Logo">
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>VARIOS</h1>
  <p>Comfort meets performance</p>
  <a href="#" class="btn">Shop Now</a>
</section>

<section class="section">
  <h2>Boxy Fit Collection</h2>

  <div class="products">
    <div class="product">
      <img src="https://via.placeholder.com/250" alt="">
      <p>Black Boxy Tee</p>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/250" alt="">
      <p>White Boxy Tee</p>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/250" alt="">
      <p>Grey Boxy Tee</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>About Varios</h2>
  <p>Built for both comfort and performance. Designed for the gym and everyday wear.</p>
</section>

<footer>
  © 2026 Varios
</footer>

</body>
</html>
